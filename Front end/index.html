<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Generatore di scuse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="stile.css" rel="stylesheet">
  </head>
  <body>

    <div class="d-flex flex-column justify-content-center align-items-center" style="height: 100vh;">
    
        <div class="text-center">
            <h1 id="titolo">Generatore di scuse di <i>merda</i></h1>
            <p>Genera scuse per:</p>

            <button class="btn btn-primary ingrandisci" onclick="getScuola()">Compiti</button>
            <button class="btn btn-success ingrandisci" onclick="getLavoro()">Lavoro</button>
            <button class="btn btn-danger ingrandisci" onclick="getUscire()">Uscire</button>
        </div>

        <div class="mt-3">
            <h2 id="output"></h2>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="chiamate.js"></script>
  </body>
</html>
